<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 320" role="img" aria-label="Meadow Lane Park — bridge, freighter, and river illustration">
  <title>Meadow Lane Park</title>

  <!-- Oval background -->
  <ellipse cx="170" cy="160" rx="168" ry="148" fill="#1a3a2a"/>
  <ellipse cx="170" cy="160" rx="160" ry="140" fill="#1B4A6B"/>

  <!-- Sky -->
  <rect x="10" y="20" width="320" height="140" fill="#1B4A6B"/>

  <!-- Sun -->
  <circle cx="255" cy="62" r="30" fill="#F5C842"/>
  <circle cx="255" cy="62" r="23" fill="#FBDC6A"/>

  <!-- Tree line / forest background -->
  <rect x="10" y="95" width="320" height="110" fill="#2C5F3A"/>
  <polygon points="10,205 75,88 140,205" fill="#1a4428"/>
  <polygon points="60,205 130,72 200,205" fill="#2C5F3A"/>
  <polygon points="120,205 185,70 250,205" fill="#1a4428"/>
  <polygon points="175,205 235,80 295,205" fill="#2C5F3A"/>
  <polygon points="225,205 290,90 330,205" fill="#1a4428"/>
  <ellipse cx="60"  cy="100" rx="26" ry="24" fill="#4a7c2a"/>
  <ellipse cx="115" cy="88"  rx="30" ry="28" fill="#3d6e24"/>
  <ellipse cx="170" cy="84"  rx="32" ry="30" fill="#4a7c2a"/>
  <ellipse cx="225" cy="88"  rx="30" ry="28" fill="#3d6e24"/>
  <ellipse cx="275" cy="97"  rx="26" ry="24" fill="#4a7c2a"/>

  <!-- River / water -->
  <ellipse cx="170" cy="218" rx="160" ry="32" fill="#3A8FC4"/>
  <ellipse cx="170" cy="232" rx="160" ry="24" fill="#2A7AB5"/>
  <ellipse cx="170" cy="250" rx="160" ry="16" fill="#1B6699"/>

  <!-- Bridge towers -->
  <rect x="72"  y="158" width="9" height="88" fill="#8B6914"/>
  <rect x="258" y="158" width="9" height="88" fill="#8B6914"/>
  <!-- Bridge deck -->
  <rect x="62"  y="192" width="216" height="7" fill="#A07820"/>
  <!-- Main cables -->
  <line x1="76"  y1="163" x2="262" y2="163" stroke="#B08828" stroke-width="3.5"/>
  <path d="M76 163 Q170 126 262 163" stroke="#C89830" stroke-width="2.5" fill="none"/>
  <!-- Suspender cables -->
  <line x1="107" y1="150" x2="104" y2="192" stroke="#A07820" stroke-width="1.3"/>
  <line x1="130" y1="141" x2="128" y2="192" stroke="#A07820" stroke-width="1.3"/>
  <line x1="152" y1="136" x2="151" y2="192" stroke="#A07820" stroke-width="1.3"/>
  <line x1="174" y1="134" x2="173" y2="192" stroke="#A07820" stroke-width="1.3"/>
  <line x1="196" y1="136" x2="195" y2="192" stroke="#A07820" stroke-width="1.3"/>
  <line x1="218" y1="141" x2="217" y2="192" stroke="#A07820" stroke-width="1.3"/>
  <line x1="238" y1="149" x2="237" y2="192" stroke="#A07820" stroke-width="1.3"/>
  <!-- Tower cross-members -->
  <rect x="69"  y="175" width="15" height="4" rx="1" fill="#7A5810"/>
  <rect x="255" y="175" width="15" height="4" rx="1" fill="#7A5810"/>
  <rect x="72"  y="240" width="9"  height="6" fill="#6B5010"/>
  <rect x="258" y="240" width="9"  height="6" fill="#6B5010"/>

  <!-- Freighter hull -->
  <rect x="86"  y="200" width="140" height="40" rx="5" fill="#C84030"/>
  <rect x="86"  y="200" width="140" height="14" rx="3" fill="#E05040"/>
  <rect x="88"  y="236" width="138" height="8"  rx="2" fill="#A03020"/>
  <!-- Wheelhouse / superstructure -->
  <rect x="88"  y="190" width="22" height="14" rx="2" fill="#D04535"/>
  <rect x="114" y="193" width="18" height="9"  rx="1" fill="#D04535"/>
  <!-- Cargo hatches -->
  <rect x="104" y="213" width="20" height="16" rx="1" fill="#F0F0E0"/>
  <rect x="128" y="213" width="20" height="16" rx="1" fill="#F0F0E0"/>
  <rect x="152" y="213" width="20" height="16" rx="1" fill="#F0F0E0"/>
  <rect x="176" y="213" width="20" height="16" rx="1" fill="#F0F0E0"/>
  <!-- Stack -->
  <rect x="92" y="183" width="10" height="12" rx="2" fill="#3A3A3A"/>

  <!-- Swans -->
  <ellipse cx="118" cy="248" rx="13" ry="6"  fill="#E8E0C8"/>
  <ellipse cx="146" cy="252" rx="13" ry="6"  fill="#E8E0C8"/>
  <path d="M105 254 Q113 249 121 254 Q117 259 105 254Z" fill="white"/>
  <path d="M133 257 Q141 252 149 257 Q145 262 133 257Z" fill="white"/>
  <!-- Swan necks -->
  <path d="M118 242 Q122 236 120 232" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M146 246 Q150 240 148 236" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Oval border ring -->
  <ellipse cx="170" cy="160" rx="168" ry="148" fill="none" stroke="#5A8A40" stroke-width="6"/>
  <ellipse cx="170" cy="160" rx="161" ry="141" fill="none" stroke="#7AAA50" stroke-width="2"/>
</svg>
