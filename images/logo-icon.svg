<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Meadow Lane Park icon">
  <title>Meadow Lane Park</title>

  <!-- Oval fill -->
  <ellipse cx="50" cy="50" rx="49" ry="49" fill="#1B4A6B"/>

  <!-- Sky gradient feel -->
  <ellipse cx="50" cy="30" rx="49" ry="35" fill="#1B4A6B"/>

  <!-- Sun -->
  <circle cx="72" cy="22" r="11" fill="#F5C842"/>
  <circle cx="72" cy="22" r="8"  fill="#FBDC6A"/>

  <!-- Trees -->
  <rect x="1" y="30" width="98" height="48" fill="#2C5F3A"/>
  <polygon points="1,78  25,32 49,78"  fill="#1a4428"/>
  <polygon points="20,78 48,24 76,78"  fill="#2C5F3A"/>
  <polygon points="50,78 74,28 98,78"  fill="#1a4428"/>
  <ellipse cx="18" cy="36" rx="14" ry="12" fill="#4a7c2a"/>
  <ellipse cx="50" cy="28" rx="16" ry="14" fill="#3d6e24"/>
  <ellipse cx="80" cy="34" rx="13" ry="12" fill="#4a7c2a"/>

  <!-- River -->
  <ellipse cx="50" cy="78" rx="49" ry="14" fill="#3A8FC4"/>
  <ellipse cx="50" cy="86" rx="49" ry="10" fill="#2A7AB5"/>

  <!-- Bridge towers -->
  <rect x="18" y="56" width="4" height="32" fill="#8B6914"/>
  <rect x="78" y="56" width="4" height="32" fill="#8B6914"/>
  <!-- Deck -->
  <rect x="14" y="70" width="72" height="3" fill="#A07820"/>
  <!-- Cables -->
  <line x1="20" y1="58" x2="80" y2="58" stroke="#B08828" stroke-width="1.5"/>
  <path d="M20 58 Q50 44 80 58" stroke="#C89830" stroke-width="1.2" fill="none"/>
  <!-- Suspenders -->
  <line x1="32" y1="52" x2="31" y2="70" stroke="#A07820" stroke-width="0.8"/>
  <line x1="42" y1="48" x2="41" y2="70" stroke="#A07820" stroke-width="0.8"/>
  <line x1="52" y1="46" x2="51" y2="70" stroke="#A07820" stroke-width="0.8"/>
  <line x1="62" y1="48" x2="61" y2="70" stroke="#A07820" stroke-width="0.8"/>
  <line x1="70" y1="51" x2="69" y2="70" stroke="#A07820" stroke-width="0.8"/>

  <!-- Freighter -->
  <rect x="22" y="72" width="56" height="16" rx="2" fill="#C84030"/>
  <rect x="22" y="72" width="56" height="6"  rx="1" fill="#E05040"/>
  <rect x="24" y="84" width="54" height="4"  rx="1" fill="#A03020"/>

  <!-- Swans -->
  <ellipse cx="34" cy="91" rx="6" ry="3" fill="white"/>
  <ellipse cx="48" cy="93" rx="6" ry="3" fill="white"/>

  <!-- Oval border -->
  <ellipse cx="50" cy="50" rx="48" ry="48" fill="none" stroke="#5A8A40" stroke-width="3"/>
</svg>
